---
- name: Hello World Sample
  hosts: all
  gather_facts: false
  pre_tasks:
    - name: Wait for Teleport identity files to become available
      delegate_to: localhost
      run_once: true
      ansible.builtin.wait_for:
        path: /tbot-output/key-cert.pub
        state: present
        timeout: 60

  tasks:
    - name: Debug - afficher ansible_ssh_common_args résolu
      ansible.builtin.debug:
        msg: "{{ ansible_ssh_common_args }}"
    
    - name: Gather facts
      ansible.builtin.setup:

    - name: "Print node hostname"
      ansible.builtin.command: "hostname"
      changed_when: false