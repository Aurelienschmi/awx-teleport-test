---
- name: Install btop
  hosts: all
  gather_facts: false
  pre_tasks:
    - name: Wait for Teleport identity files to become available
      delegate_to: localhost
      run_once: true
      ansible.builtin.wait_for:
        path: /tbot-output/key-cert.pub
        state: present
        timeout: 60

  tasks:
    - name: Gather facts
      ansible.builtin.setup:

    - name: Update apt cache
      become: true
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install btop
      become: true
      ansible.builtin.apt:
        name: btop
        state: present

    - name: Verify btop is installed
      ansible.builtin.command: btop --version
      register: btop_version
      changed_when: false

    - name: Display btop version
      ansible.builtin.debug:
        msg: "{{ btop_version.stdout }}"