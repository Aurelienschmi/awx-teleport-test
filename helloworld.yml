- name: Hello World Sample
  hosts: all
  gather_facts: false
  pre_tasks:
    - name: Wait for Teleport ssh_config to become available
      delegate_to: localhost
      run_once: true
      ansible.builtin.wait_for:
        path: /tbot-output/ssh_config
        state: present
        timeout: 120

    - name: Configure SSH via Teleport
      ansible.builtin.set_fact:
        ansible_ssh_common_args: "-F /tbot-output/ssh_config"

  tasks:
    - name: Show generated ssh_config (debug)
      delegate_to: localhost
      ansible.builtin.command: cat /tbot-output/ssh_config
      register: ssh_config_content
      changed_when: false

    - name: Display ssh_config content
      ansible.builtin.debug:
        var: ssh_config_content.stdout_lines
        
    - name: Gather facts
      ansible.builtin.setup:

    - name: "Print node hostname"
      ansible.builtin.command: "hostname"
      changed_when: false