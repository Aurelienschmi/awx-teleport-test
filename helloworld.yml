---
- name: Hello World Sample
  hosts: all
  gather_facts: false
  pre_tasks:
    - name: Wait for Teleport identity files to become available
      delegate_to: localhost
      run_once: true
      ansible.builtin.wait_for:
        path: /tbot-output/key-cert.pub
        state: present
        timeout: 60

    - name: PAUSE DEBUG - garder le pod vivant pour investigation
      delegate_to: localhost
      ansible.builtin.pause:
        seconds: 300

  tasks:
    - name: Gather facts
      ansible.builtin.setup: